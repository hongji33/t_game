<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>오션중 학기말 빌런 물리치기</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #ff007f;
            --secondary: #00f0ff;
            --success: #39ff14;
            --bg-dark: #0f172a;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Arial Black', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: radial-gradient(circle at center, #1e1b4b, #0f172a);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.15);
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            text-align: center;
        }

        .screen.active {
            display: flex;
        }

        .game-title {
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 3rem;
            line-height: 1.3;
            text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary);
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), #ff0055);
            color: white;
            border: none;
            padding: 1.2rem 3rem;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px var(--primary);
        }

        .game-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .timer-box { color: #ff3333; }
        .score-box { color: var(--secondary); }

        .game-field {
            flex: 1;
            width: 100%;
            position: relative;
            margin: 1.5rem 0;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px dashed rgba(0, 240, 255, 0.2);
        }

        .monster {
            position: absolute;
            font-size: 1.8rem;
            font-weight: 900;
            color: #ffffff;
            background: linear-gradient(135deg, #2e1065, #3b0764);
            padding: 1.5rem 2rem;
            border-radius: 30px;
            border: 3px solid var(--primary);
            box-shadow: 0 0 30px var(--primary);
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.1s ease-out;
            transform: translate(-50%, -50%);
            left: 50%;
            top: 50%;
        }

        .monster:active {
            transform: translate(-50%, -50%) scale(0.9);
        }

        .status-panel {
            width: 100%;
            margin-bottom: 1rem;
        }

        .gauge-label {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
        }

        .bar-outer {
            width: 100%;
            height: 28px;
            background-color: #020617;
            border-radius: 50px;
            padding: 3px;
            border: 2px solid rgba(0, 240, 255, 0.3);
        }

        .bar-inner {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--success));
            border-radius: 50px;
            transition: width 0.05s ease-out;
        }

        .combo-effect {
            position: absolute;
            font-size: 3.5rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px #ff0055, 0 0 40px #ffea00;
            animation: explosion 0.3s ease-out forwards;
            pointer-events: none;
            z-index: 999;
        }

        @keyframes explosion {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(1.2) translateY(-40px); opacity: 0; }
        }

        .result-main {
            font-size: 2.8rem;
            font-weight: 900;
            margin-bottom: 1.5rem;
        }

        .win .result-main { color: var(--success); text-shadow: 0 0 20px var(--success); }
        .lose .result-main { color: #ff3333; text-shadow: 0 0 20px #ff3333; }

        .result-sub {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 3rem;
            white-space: pre-line;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="scr-start" class="screen active">
            <div class="game-title">오션중 학기말<br>👾 빌런 타격대 👾</div>
            <button class="btn" id="btn-start">게임 시작</button>
        </div>

        <div id="scr-game" class="screen">
            <div class="game-header">
                <div class="score-box">HIT: <span id="txt-score">0</span> / 80</div>
                <div class="timer-box">⏱️ <span id="txt-timer">20</span>s</div>
            </div>
            
            <div class="game-field" id="field">
                <div class="monster" id="target-monster">성적 마감 오류 ❌</div>
            </div>

            <div class="status-panel">
                <div class="gauge-label">
                    <span>스트레스 해소율</span>
                    <span id="txt-progress">0%</span>
                </div>
                <div class="bar-outer">
                    <div class="bar-inner" id="gauge"></div>
                </div>
            </div>
        </div>

        <div id="scr-result" class="screen">
            <div class="result-main" id="res-title">결과</div>
            <div class="result-sub" id="res-desc">설명</div>
            <button class="btn" id="btn-retry" style="background: linear-gradient(135deg, var(--secondary), #00a0ff); box-shadow: 0 0 20px var(--secondary);">다시 도전</button>
        </div>
    </div>

    <script>
        // 🎯 목표 수치를 80으로 세팅
        const goal = 80; 
        let score = 0;
        let clock = 20;
        let loop = null;
        let comboCount = 0; 
        const pool = ['성적 마감 오류 ❌', '나이스 상신 반려 ↩️', '학기말 생기부 지옥 📝'];

        const scrStart = document.getElementById('scr-start');
        const scrGame = document.getElementById('scr-game');
        const scrResult = document.getElementById('scr-result');
        const btnStart = document.getElementById('btn-start');
        const btnRetry = document.getElementById('btn-retry');
        const field = document.getElementById('field');
        const monster = document.getElementById('target-monster');
        const gauge = document.getElementById('gauge');
        const txtScore = document.getElementById('txt-score');
        const txtTimer = document.getElementById('txt-timer');
        const txtProgress = document.getElementById('txt-progress');
        const resTitle = document.getElementById('res-title');
        const resDesc = document.getElementById('res-desc');

        btnStart.addEventListener('click', runGame);
        btnRetry.addEventListener('click', cleanRoom);
        
        monster.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = field.getBoundingClientRect();
            smash(touch.clientX - rect.left, touch.clientY - rect.top);
        });

        monster.addEventListener('mousedown', (e) => {
            if (!('ontouchstart' in window)) {
                const rect = field.getBoundingClientRect();
                smash(e.clientX - rect.left, e.clientY - rect.top);
            }
        });

        function runGame() {
            scrStart.classList.remove('active');
            scrGame.classList.add('active');
            warpMonster();
            
            loop = setInterval(() => {
                clock--;
                txtTimer.innerText = clock;
                if (clock <= 0) gameOver();
            }, 1000);
        }

        function smash(x, y) {
            if (clock <= 0) return;

            score++;
            comboCount++; 
            txtScore.innerText = score;
            
            const rate = Math.min((score / goal) * 100, 100);
            gauge.style.width = rate + '%';
            txtProgress.innerText = Math.floor(rate) + '%';

            popFX(x, y);

            if (navigator.vibrate) navigator.vibrate(30);

            if (score >= goal) {
                gameOver();
            } else {
                if (comboCount >= 3) {
                    warpMonster();
                    comboCount = 0; 
                }
            }
        }

        function warpMonster() {
            const randomX = Math.floor(Math.random() * 50) + 25; 
            const randomY = Math.floor(Math.random() * 50) + 25; 
            
            monster.style.left = randomX + '%';
            monster.style.top = randomY + '%';
            monster.innerText = pool[Math.floor(Math.random() * pool.length)];
        }

        function popFX(x, y) {
            const fx = document.createElement('div');
            fx.className = 'combo-effect';
            fx.innerText = ['💥 펑!', '🔥 나이스!', '⚡ 퇴치!', '🔨 콰광!'][Math.floor(Math.random() * 4)];
            fx.style.left = (x - 40) + 'px';
            fx.style.top = (y - 60) + 'px';
            
            field.appendChild(fx);
            setTimeout(() => fx.remove(), 300);
        }

        function gameOver() {
            clearInterval(loop);
            scrGame.classList.remove('active');
            scrResult.classList.add('active');

            if (score >= goal) {
                scrResult.className = 'screen active win';
                resTitle.innerHTML = '🏆 WINNER! 🏆<br>방학 대개막';
                resDesc.innerText = '오션중 빌런들을 완벽히 격파했습니다!\n행복한 휴가와 방학이 선생님을 기다립니다! 🚀';
                celebrate();
            } else {
                scrResult.className = 'screen active lose';
                resTitle.innerHTML = '☠️ GAME OVER ☠️<br>방학 연기 레이드';
                resDesc.innerText = `빌런의 체력이 아직 ${goal - score} 남았습니다.\n교무실로 리스폰되어 다시 도전하세요!`;
            }
        }

        function celebrate() {
            let duration = 3.5 * 1000;
            let end = Date.now() + duration;

            (function ticker() {
                confetti({ particleCount: 7, angle: 60, spread: 60, origin: { x: 0, y: 0.8 }, colors: ['#ff007f', '#00f0ff', '#ffffff'] });
                confetti({ particleCount: 7, angle: 120, spread: 60, origin: { x: 1, y: 0.8 }, colors: ['#ff007f', '#00f0ff', '#ffffff'] });
                if (Date.now() < end) requestAnimationFrame(ticker);
            }());
        }

        function cleanRoom() {
            score = 0;
            clock = 20;
            comboCount = 0;
            gauge.style.width = '0%';
            txtScore.innerText = '0';
            txtTimer.innerText = '20';
            txtProgress.innerText = '0%';
            scrResult.classList.remove('active');
            scrStart.classList.add('active');
        }
    </script>
</body>
</html>
