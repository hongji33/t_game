<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>오션중 학기말 빌런 물리치기</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #ff007f;
            --secondary: #00f0ff;
            --success: #39ff14;
            --bg-dark: #020617;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Arial Black', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.2);
            overflow: hidden;
        }

        /* 🖼️ 배경 이미지 레이어 스타일 */
        .bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: opacity 0.5s ease;
            z-index: 0;
        }

        /* 메인 대기 화면용 화려한 레트로 아케이드 이미지 */
        #bg-main {
            background-image: linear-gradient(rgba(15, 23, 42, 0.75), rgba(15, 23, 42, 0.75)), 
                              url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=600&auto=format&fit=crop');
            opacity: 1;
        }

        /* 게임 플레이 화면용 사이버펑크 네온 그리드 이미지 */
        #bg-game {
            background-image: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)), 
                              url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=600&auto=format&fit=crop');
            opacity: 0;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
            padding: 2rem;
        }

        .screen.active {
            display: flex;
        }

        .game-title {
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 3rem;
            line-height: 1.3;
            text-shadow: 0 0 15px var(--primary), 0 0 30px var(--primary);
            color: #fff;
        }

        .info-text {
            font-size: 1.1rem;
            color: #cbd5e1;
            margin-bottom: 2rem;
            background: rgba(0, 0, 0, 0.6);
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), #ff0055);
            color: white;
            border: none;
            padding: 1.2rem 3rem;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px var(--primary);
            transition: transform 0.1s;
        }

        .btn:active { transform: scale(0.95); }

        /* HUD 전술 계기판 스타일 */
        .game-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 15px;
            border: 2px solid rgba(0, 240, 255, 0.4);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.1);
        }

        .timer-box { color: #ff3333; text-shadow: 0 0 5px #ff3333; }
        .score-box { color: var(--secondary); text-shadow: 0 0 5px var(--secondary); }

        .game-field {
            flex: 1;
            width: 100%;
            position: relative;
            margin: 1.5rem 0;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px dashed rgba(255, 255, 255, 0.15);
        }

        .monster {
            position: absolute;
            font-size: 1.6rem;
            font-weight: 900;
            color: #ffffff;
            background: rgba(30, 27, 75, 0.85);
            padding: 1.2rem 1.8rem;
            border-radius: 25px;
            border: 3px solid var(--primary);
            box-shadow: 0 0 30px var(--primary);
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.1s ease-out;
            transform: translate(-50%, -50%);
            left: 50%;
            top: 50%;
            backdrop-filter: blur(5px);
        }

        .monster:active { transform: translate(-50%, -50%) scale(0.9); }

        .status-panel { width: 100%; margin-bottom: 1rem; }

        .gauge-label {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
        }

        .bar-outer {
            width: 100%;
            height: 28px;
            background-color: rgba(2, 6, 23, 0.8);
            border-radius: 50px;
            padding: 3px;
            border: 2px solid rgba(0, 240, 255, 0.3);
        }

        .bar-inner {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--success));
            border-radius: 50px;
            box-shadow: 0 0 10px var(--secondary);
            transition: width 0.05s ease-out;
        }

        .combo-effect {
            position: absolute;
            font-size: 3rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px #ff0055, 0 0 40px #ffea00;
            animation: explosion 0.3s ease-out forwards;
            pointer-events: none;
            z-index: 999;
        }

        @keyframes explosion {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(1.2) translateY(-40px); opacity: 0; }
        }

        .result-main { font-size: 2.8rem; font-weight: 900; margin-bottom: 1.5rem; }
        .win .result-main { color: var(--success); text-shadow: 0 0 20px var(--success); }
        .lose .result-main { color: #ff3333; text-shadow: 0 0 20px #ff3333; }
        .result-sub { font-size: 1.2rem; color: #cbd5e1; margin-bottom: 3rem; white-space: pre-line; background: rgba(0,0,0,0.6); padding: 1.2rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div class="container">
        <div id="bg-main" class="bg-layer"></div>
        <div id="bg-game" class="bg-layer"></div>

        <div id="scr-start" class="screen active">
            <div class="game-title">오션중 학기말<br>👾 빌런 타격대 👾</div>
            <div class="info-text">🎯 목표 타격: <span id="txt-start-goal" style="color:var(--secondary); font-weight:bold;">80</span>회</div>
            <button class="btn" id="btn-start">게임 시작</button>
        </div>

        <div id="scr-game" class="screen">
            <div class="game-header">
                <div class="score-box">HIT: <span id="txt-score">0</span> / <span id="txt-goal">80</span></div>
                <div class="timer-box">⏱️ <span id="txt-timer">20</span>s</div>
            </div>
            
            <div class="game-field" id="field">
                <div class="monster" id="target-monster">성적 마감 오류 ❌</div>
            </div>

            <div class="status-panel">
                <div class="gauge-label">
                    <span>스트레스 해소율</span>
                    <span id="txt-progress">0%</span>
                </div>
                <div class="bar-outer">
                    <div class="bar-inner" id="gauge"></div>
                </div>
            </div>
        </div>

        <div id="scr-result" class="screen">
            <div class="result-main" id="res-title">결과</div>
            <div class="result-sub" id="res-desc">설명</div>
            <button class="btn" id="btn-retry" style="background: linear-gradient(135deg, var(--secondary), #00a0ff); box-shadow: 0 0 20px var(--secondary);">다시 도전</button>
        </div>
    </div>

    <script>
        // URL 주소창 난이도 제어 파라미터 세팅
        const urlParams = new URLSearchParams(window.location.search);
        let goal = parseInt(urlParams.get('goal')) || 80; 

        let score = 0;
        let clock = 20;
        let loop = null;
        let comboCount = 0; 
        const pool = ['성적 마감 오류 ❌', '나이스 상신 반려 ↩️', '학기말 생기부 지옥 📝'];

        const scrStart = document.getElementById('scr-start');
        const scrGame = document.getElementById('scr-game');
        const scrResult = document.getElementById('scr-result');
        const bgMain = document.getElementById('bg-main');
        const bgGame = document.getElementById('bg-game');
        
        const btnStart = document.getElementById('btn-start');
        const btnRetry = document.getElementById('btn-retry');
        const field = document.getElementById('field');
        const monster = document.getElementById('target-monster');
        const gauge = document.getElementById('gauge');
        const txtScore = document.getElementById('txt-score');
        const txtGoal = document.getElementById('txt-goal');
        const txtStartGoal = document.getElementById('txt-start-goal');
        const txtTimer = document.getElementById('txt-timer');
        const txtProgress = document.getElementById('txt-progress');
        const resTitle = document.getElementById('res-title');
        const resDesc = document.getElementById('res-desc');

        txtStartGoal.innerText = goal;
        txtGoal.innerText = goal;

        btnStart.addEventListener('click', runGame);
        btnRetry.addEventListener('click', cleanRoom);
        
        // 🛠️ 터치 버그(더블 카운트) 완전 해결용 이벤트 차단 처리
        monster.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            const touch = e.touches[0];
            const rect = field.getBoundingClientRect();
            smash(touch.clientX - rect.left, touch.clientY - rect.top);
        });

        monster.addEventListener('mousedown', (e) => {
            if (!('ontouchstart' in window)) {
                const rect = field.getBoundingClientRect();
                smash(e.clientX - rect.left, e.clientY - rect.top);
            }
        });

        function runGame() {
            scrStart.classList.remove('active');
            scrGame.classList.add('active');
            
            // 스마트 배경 페이드 전환 효과
            bgMain.style.opacity = '0';
            bgGame.style.opacity = '1';
            
            warpMonster();
            
            loop = setInterval(() => {
                clock--;
                txtTimer.innerText = clock;
                if (clock <= 0) gameOver();
            }, 1000);
        }

        function smash(x, y) {
            if (clock <= 0) return;

            score++;
            comboCount++; 
            txtScore.innerText = score;
            
            const rate = Math.min((score / goal) * 100, 100);
            gauge.style.width = rate + '%';
            txtProgress.innerText = Math.floor(rate) + '%';

            popFX(x, y);

            if (navigator.vibrate) navigator.vibrate(30);

            if (score >= goal) {
                gameOver();
            } else {
                if (comboCount >= 3) {
                    warpMonster();
                    comboCount = 0; 
                }
            }
        }

        function warpMonster() {
            const randomX = Math.floor(Math.random() * 50) + 25; 
            const randomY = Math.floor(Math.random() * 50) + 25; 
            
            monster.style.left = randomX + '%';
            monster.style.top = randomY + '%';
            monster.innerText = pool[Math.floor(Math.random() * pool.length)];
        }

        function popFX(x, y) {
            const fx = document.createElement('div');
            fx.className = 'combo-effect';
            fx.innerText = ['💥 펑!', '🔥 나이스!', '⚡ 퇴치!', '🔨 콰광!'][Math.floor(Math.random() * 4)];
            fx.style.left = (x - 40) + 'px';
            fx.style.top = (y - 60) + 'px';
            
            field.appendChild(fx);
            setTimeout(() => fx.remove(), 300);
        }

        function gameOver() {
            clearInterval(loop);
            scrGame.classList.remove('active');
            scrResult.classList.add('active');

            if (score >= goal) {
                scrResult.className = 'screen active win';
                resTitle.innerHTML = '🏆 WINNER! 🏆<br>방학 대개막';
                resDesc.innerText = `오션중 빌런들을 완벽히 격파했습니다!\n행복한 휴가와 방학이 선생님을 기다립니다! 🚀`;
                celebrate();
            } else {
                scrResult.className = 'screen active lose';
                resTitle.innerHTML = '☠️ GAME OVER ☠️<br>방학 연기 레이드';
                resDesc.innerText = `빌런의 체력이 아직 ${goal - score} 남았습니다.\n교무실로 리스폰되어 다시 도전하세요!`;
            }
        }

        function celebrate() {
            let duration = 3.5 * 1000;
            let end = Date.now() + duration;

            (function ticker() {
                confetti({ particleCount: 7, angle: 60, spread: 60, origin: { x: 0, y: 0.8 }, colors: ['#ff007f', '#00f0ff', '#ffffff'] });
                confetti({ particleCount: 7, angle: 120, spread: 60, origin: { x: 1, y: 0.8 }, colors: ['#ff007f', '#00f0ff', '#ffffff'] });
                if (Date.now() < end) requestAnimationFrame(ticker);
            }());
        }

        function cleanRoom() {
            score = 0;
            clock = 20;
            comboCount = 0;
            gauge.style.width = '0%';
            txtScore.innerText = '0';
            txtTimer.innerText = '20';
            txtProgress.innerText = '0%';
            scrResult.classList.remove('active');
            scrStart.classList.add('active');
            
            // 메인 대기용 배경으로 롤백
            bgMain.style.opacity = '1';
            bgGame.style.opacity = '0';
        }
    </script>
</body>
</html>
