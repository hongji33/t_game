<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>오션중 학기말 빌런 물리치기</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #ff007f;
            --secondary: #00f0ff;
            --success: #39ff14;
            --bg-dark: #0f172a;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Arial Black', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: radial-gradient(circle at center, #1e1b4b, #0f172a);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.15);
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            text-align: center;
        }

        .screen.active {
            display: flex;
        }

        .game-title {
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 3rem;
            line-height: 1.3;
            text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary);
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), #ff0055);
            color: white;
            border: none;
            padding: 1.2rem 3rem;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px var(--primary);
        }

        .game-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .timer-box { color: #ff3333; }
        .score-box { color: var(--secondary); }

        .game-field {
            flex: 1;
            width: 100%;
            position: relative;
            margin: 1.5rem 0;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px dashed rgba(0, 240, 255, 0.2);
        }

        .monster {
            position: absolute;
            font-size: 1.8rem;
            font-weight: 900;
            color: #ffffff;
            background: linear-gradient(135deg, #2e1065, #3b0764);
            padding: 1.5rem 2rem;
            border-radius: 30px;
            border: 3px solid var(--primary);
            box-shadow: 0 0 30px var(--primary);
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.1s ease-out;
            transform: translate(-50%, -50%);
            left: 50%;
            top: 50%;
        }

        .monster:active {
            transform: translate(-50%, -50%) scale(0.9);
        }

        .status-panel {
            width: 100%;
            margin-bottom: 1rem;
        }

        .gauge-label {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
        }

        .bar-outer {
            width: 100%;
            height: 28px;
            background-color: #020617;
            border-radius: 50px;
            padding: 3px;
            border: 2px solid rgba(0, 240, 255, 0.3);
        }

        .bar-inner {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--success));
            border-radius: 50px;
            transition: width 0.05s ease-out;
        }

        .combo-effect {
            position: absolute;
            font-size: 3.5rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px #ff0055, 0 0 40px #ffea00;
            animation: explosion 0.3s ease-out forwards;
            pointer-events: none;
            z-index: 999;
        }

        @keyframes explosion {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(1.2) translateY(-40px); opacity: 0; }
        }

        .result-main {
            font-size: 2.8rem;
            font-weight: 900;
            margin-bottom: 1.5rem;
        }

        .win .result-main { color: var(--success); text-shadow: 0 0 20px var(--success); }
